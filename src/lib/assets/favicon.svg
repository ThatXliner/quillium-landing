<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="emboss" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="2.5" dy="2.5" stdDeviation="4" flood-color="#8a90a0" flood-opacity="0.55"/>
      <feDropShadow dx="-2" dy="-2" stdDeviation="4" flood-color="#fff" flood-opacity="0.85"/>
    </filter>
  </defs>
  <!--
    Embossed quill silhouette — "Original" shape
    Settings: x=13, y=-4, rot=19, scale=1.18
  -->
  <g transform="translate(113, 96) rotate(19) scale(1.18) translate(-100, -100)" filter="url(#emboss)">
    <!-- Dark stroke -->
    <path d="M140,28 C128,42 110,55 90,68 C74,80 62,96 56,116 C52,132 52,150 56,168 L60,174 C60,152 64,134 72,118 C82,100 96,88 112,76 C126,65 136,50 140,36Z"
          fill="none" stroke="#8a90a0" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M138,32 C118,62 94,98 72,135 C62,150 58,166 58,174"
          fill="none" stroke="#8a90a0" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Light stroke (offset for emboss) -->
    <g transform="translate(-1,-1)">
      <path d="M140,28 C128,42 110,55 90,68 C74,80 62,96 56,116 C52,132 52,150 56,168 L60,174 C60,152 64,134 72,118 C82,100 96,88 112,76 C126,65 136,50 140,36Z"
            fill="none" stroke="white" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" opacity="0.5"/>
      <path d="M138,32 C118,62 94,98 72,135 C62,150 58,166 58,174"
            fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
    </g>
    <!-- Ink dots: grape cluster at the tip -->
    <!-- Top row (1) -->
    <circle cx="58" cy="174" r="3.2" fill="#3b82f6"/>
    <!-- Middle row (2) -->
    <circle cx="55" cy="179.5" r="3.2" fill="#a855f7"/>
    <circle cx="61" cy="179.5" r="3.2" fill="#22c55e"/>
    <!-- Bottom row (1) -->
    <circle cx="58" cy="185" r="3.2" fill="#fcbc05"/>
  </g>
</svg>
